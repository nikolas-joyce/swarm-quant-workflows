name: 06 — Weekly Alternative Signals & Strategy Monitor

on:
  schedule:
    # Every Monday at 10:00 AM Eastern (14:00 UTC)
    - cron: '0 14 * * 1'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run-report:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Write Gmail token from secret
        env:
          GMAIL_TOKEN_JSON: ${{ secrets.GMAIL_TOKEN_JSON }}
        run: python3 -c "import os; open('token.json','w').write(os.environ['GMAIL_TOKEN_JSON'])"

      - name: Run Alt Signals Monitor
        env:
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
          GMAIL_TOKEN_PATH: token.json
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python 06_alt_signals/alt_signals.py

      - name: Clean up token file
        if: always()
        run: rm -f token.json
